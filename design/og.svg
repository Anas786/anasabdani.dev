<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0b11" />
      <stop offset="1" stop-color="#070709" />
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 90) rotate(130) scale(520)">
      <stop stop-color="#22d3ee" stop-opacity="0.22" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 620) rotate(-50) scale(560)">
      <stop stop-color="#3b82f6" stop-opacity="0.24" />
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="accent" x1="84" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6" />
      <stop offset="1" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="logoStroke" x1="0" y1="96" x2="96" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6" />
      <stop offset="1" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="bigA" x1="820" y1="560" x2="1140" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6" stop-opacity="0.16" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.10" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow1)" />
  <rect width="1200" height="630" fill="url(#glow2)" />

  <!-- decorative large monogram on the right -->
  <path d="M860 470 L985 175 L1110 470" stroke="url(#bigA)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M918 360 L1052 360" stroke="url(#bigA)" stroke-width="26" stroke-linecap="round" fill="none" />

  <!-- logo monogram -->
  <g transform="translate(84 70)">
    <rect x="1" y="1" width="94" height="94" rx="24" fill="#13131a" stroke="#2b2b35" stroke-width="1.5" />
    <path d="M26 70 L48 26 L70 70" stroke="url(#logoStroke)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M36 53 L60 53" stroke="url(#logoStroke)" stroke-width="8" stroke-linecap="round" />
    <circle cx="48" cy="26" r="4.5" fill="#22d3ee" />
  </g>

  <!-- eyebrow -->
  <text x="86" y="320" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="6" fill="#22d3ee">ENGINEERING MANAGER</text>

  <!-- name -->
  <text x="82" y="428" font-family="'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="700" letter-spacing="-2" fill="#f5f5f7">Muhammad Anas</text>

  <!-- accent line -->
  <rect x="86" y="462" width="220" height="6" rx="3" fill="url(#accent)" />

  <!-- subtitle -->
  <text x="86" y="525" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="500" fill="#b6b6c2">10+ years leading multi-team engineering organizations</text>

  <!-- tagline -->
  <text x="86" y="572" font-family="'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="400" fill="#7b7b88">Cloud-native platforms · Serverless · AWS · Delivery leadership</text>

  <!-- domain -->
  <text x="1116" y="592" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="600" fill="#5f5f6b">anasabdani.dev</text>
</svg>
